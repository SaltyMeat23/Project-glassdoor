# Dependabot — weekly updates, grouped to reduce PR noise; majors held for review.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      dev-deps:
        dependency-type: 'development'
        update-types: ['minor', 'patch']
    ignore:
      # Framework majors require manual migration.
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'npm'
    directory: '/platform'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      all-deps:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
